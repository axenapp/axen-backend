services:
  postgres:
    image: postgres:15
    container_name: axen_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: axen_db
    ports:
      - '5432:5432'
    volumes:
      - axen_postgres_data:/var/lib/postgresql/data

volumes:
  axen_postgres_data:
